name: Metrics
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          plugin_order:
            - repository
            - language
            - activity
          plugin_config:
            repository:
              token: ${{ secrets.METRICS_TOKEN }}
            language:
              token: ${{ secrets.METRICS_TOKEN }}
            activity:
              token: ${{ secrets.METRICS_TOKEN }}
          output-file: metrics.svg
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add metrics.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update metrics" && git push)
