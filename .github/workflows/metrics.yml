name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # 每天運行一次
  workflow_dispatch: # 支持手動觸發

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: alandevc8763
          template: classic
          base: "" 
          plugin_languages: yes
          plugin_habits: yes
          plugin_activities: yes
          config_timezone: Asia/Taipei
          config_build_gitexe: yes
          theme: tokyonight
